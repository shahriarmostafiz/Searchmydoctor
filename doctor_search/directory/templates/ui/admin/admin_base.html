{% extends "ui/base.html" %}
{% block title %}Admin{% endblock %}

{% block content %}
<div class="row g-3">
  <div class="col-lg-3">
    <div class="card">
      <div class="card-body">
        <div class="fw-bold mb-2">Admin Panel</div>
        <div class="list-group">
          <a class="list-group-item list-group-item-action"
             href="{% url 'admin_dashboard' %}">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
          <a class="list-group-item list-group-item-action"
             href="{% url 'doctor_list_ui' %}">
            <i class="bi bi-person-badge me-2"></i>Doctors
          </a>
          <a class="list-group-item list-group-item-action"
             href="{% url 'doctor_create_ui' %}">
            <i class="bi bi-plus-circle me-2"></i>Add Doctor
          </a>
        </div>

        <div class="mt-3 small text-muted">
          Only superusers can access this area.
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-9">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
